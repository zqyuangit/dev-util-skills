interface:
  display_name: "Multi-Session Project Coordinator"
  short_description: "Coordinate worker threads, fallback worktrees, and safe heartbeat micro-tasks."
  default_prompt: "Use $multi-session-project-coordinator after drafting the development plan to decide whether multi-session coordination is worthwhile, recommend worker count and role split, confirm with the user, then create or bind worker threads, verify cwd, dispatch scoped prompts, supervise with pending worktree fallback, and use safe idle micro-tasks during heartbeat checks when appropriate."
policy:
  allow_implicit_invocation: true
